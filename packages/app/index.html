<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lit Scan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg: #0b0b0b;
      --panel: #111;
      --line: #242424;
      --text: #f1f1f1;
      --muted: #777;
      --dim: #4b4b4b;
      --green: #00c896;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .page {
      width: min(720px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(24px, 5vh, 48px) 0;
      display: grid;
      align-content: center;
      gap: 22px;
    }

    header {
      display: grid;
      gap: 12px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--dim);
      font-size: 12px;
    }

    a {
      color: var(--muted);
      text-decoration: none;
    }

    a:hover {
      color: var(--green);
    }

    .links {
      display: flex;
      gap: 14px;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: clamp(3.2rem, 12vw, 6rem);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0;
    }

    .copy {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .accent {
      color: var(--green);
    }

    .label {
      margin: 0;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dim {
      color: var(--dim);
    }

    .demo {
      display: grid;
      gap: 10px;
    }

    @media (max-height: 760px) {
      .page {
        align-content: start;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <div class="nav">
        <span>Lit rerender scanner</span>
        <div class="links">
          <a href="/skill.md" target="_blank" rel="noreferrer">skill</a>
          <a href="https://github.com/alvarosh15/lit-scan" target="_blank" rel="noreferrer">github</a>
        </div>
      </div>
      <h1>Lit Scan</h1>
      <p class="copy">
        Highlights Lit component rerenders in real time, keeps a floating
        counter, and exposes <span class="accent">window.litScan.report()</span>
        for browser agents. Inspired by <a href="https://react-scan.com/">react-scan.com</a>.
      </p>
    </header>

    <install-snippet></install-snippet>

    <section class="demo" aria-labelledby="demo-title">
      <p class="label" id="demo-title">Try it</p>
      <my-element name="World"></my-element>
    </section>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
